<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARD Support — Texas Special Ed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-cream: #FDF8F0;
            --deep-navy: #1B2A4A;
            --soft-blue: #4A7AA5;
            --gentle-gold: #D4A853;
            --light-gold: #F5E6C4;
            --text-dark: #2C3E50;
            --text-light: #6B7B8D;
            --white: #FFFFFF;
            --border: #E8DDD0;
            --success-green: #5A9E6F;
            --urgency-red: #C0544F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--warm-cream);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ── Chat Widget (Embedded Version) ─────────────── */
        .chat-container {
            max-width: 480px;
            margin: 40px auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow:
                0 4px 24px rgba(27, 42, 74, 0.08),
                0 1px 3px rgba(27, 42, 74, 0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 640px;
        }

        /* ── Header ─────────────────────────────────────── */
        .chat-header {
            background: var(--deep-navy);
            padding: 20px 24px;
            color: var(--white);
        }

        .chat-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            font-weight: 400;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success-green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Messages Area ──────────────────────────────── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.agent {
            background: var(--warm-cream);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: var(--deep-navy);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.system {
            background: var(--light-gold);
            color: var(--text-dark);
            align-self: center;
            text-align: center;
            font-size: 13px;
            border-radius: 12px;
            max-width: 90%;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--warm-cream);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: none;
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typingBounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Intake Complete Card ───────────────────────── */
        .intake-card {
            background: linear-gradient(135deg, var(--deep-navy), #2A3F6A);
            color: var(--white);
            border-radius: 16px;
            padding: 20px;
            margin-top: 8px;
            animation: fadeUp 0.4s ease;
        }

        .intake-card h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 17px;
            margin-bottom: 12px;
            color: var(--gentle-gold);
        }

        .intake-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .intake-row:last-child { border: none; }

        .intake-label { color: rgba(255,255,255,0.6); }
        .intake-value { font-weight: 600; }

        .urgency-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .urgency-high { background: var(--urgency-red); }
        .urgency-medium { background: var(--gentle-gold); color: var(--text-dark); }
        .urgency-low { background: var(--success-green); }

        /* ── Input Area ─────────────────────────────────── */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--white);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text-dark);
        }

        .chat-input:focus {
            border-color: var(--soft-blue);
        }

        .chat-input::placeholder {
            color: var(--text-light);
        }

        .chat-input:disabled {
            background: #F5F3EF;
            cursor: not-allowed;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border: none;
            background: var(--deep-navy);
            color: var(--white);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--soft-blue);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
        }

        .privacy-note {
            font-size: 11px;
            color: var(--text-light);
            text-align: center;
            margin-top: 8px;
        }

        /* ── Floating Widget Version ────────────────────── */
        /* Uncomment this section to use as a popup widget instead */
        /*
        .widget-trigger {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: var(--deep-navy);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(27,42,74,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .widget-trigger:hover { transform: scale(1.1); }

        .chat-container.floating {
            position: fixed;
            bottom: 100px;
            right: 24px;
            margin: 0;
            z-index: 9998;
            display: none;
        }

        .chat-container.floating.open { display: flex; }
        */
    </style>
</head>
<body>

<div class="chat-container" id="chatContainer">
    <!-- Header -->
    <div class="chat-header">
        <h1>ARD Support Agent</h1>
        <p><span class="status-dot"></span>Here to help with your child's special education</p>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
        <!-- Messages will be injected here -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <div class="input-row">
            <input
                type="text"
                class="chat-input"
                id="chatInput"
                placeholder="Type your answer..."
                autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="privacy-note">Your information is confidential and only used to connect you with help.</div>
    </div>
</div>

<script>
    // ── State ──────────────────────────────────────────
    let sessionId = null;
    let isComplete = false;

    const messagesEl = document.getElementById('chatMessages');
    const inputEl = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typingIndicator');

    // ── API Base URL ───────────────────────────────────
    // Change this when deploying
    const API_BASE = window.location.origin;

    // ── Functions ──────────────────────────────────────
    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = text;
        messagesEl.insertBefore(div, typingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showIntakeCard(intake) {
        const urgencyClass = `urgency-${intake.urgency}`;
        const card = document.createElement('div');
        card.className = 'intake-card';
        card.innerHTML = `
            <h3>Intake Summary</h3>
            <div class="intake-row">
                <span class="intake-label">District</span>
                <span class="intake-value">${intake.district}</span>
            </div>
            <div class="intake-row">
                <span class="intake-label">Meeting</span>
                <span class="intake-value">${intake.meeting_status}</span>
            </div>
            <div class="intake-row">
                <span class="intake-label">Services Denied</span>
                <span class="intake-value">${intake.services_denied}</span>
            </div>
            <div class="intake-row">
                <span class="intake-label">Pressured</span>
                <span class="intake-value">${intake.pressured_to_sign}</span>
            </div>
            <div class="intake-row">
                <span class="intake-label">Urgency</span>
                <span class="intake-value">
                    <span class="urgency-badge ${urgencyClass}">${intake.urgency}</span>
                </span>
            </div>
        `;
        messagesEl.insertBefore(card, typingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping(show) {
        typingEl.className = show ? 'typing-indicator active' : 'typing-indicator';
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setInputEnabled(enabled) {
        inputEl.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) inputEl.focus();
    }

    async function startChat() {
        showTyping(true);
        setInputEnabled(false);

        try {
            const res = await fetch(`${API_BASE}/api/start`, { method: 'POST' });
            const data = await res.json();

            sessionId = data.session_id;
            showTyping(false);
            addMessage(data.response, 'agent');
            setInputEnabled(true);
        } catch (err) {
            showTyping(false);
            addMessage("Hi there! I'm here to help with your child's special education situation. What school district are you in?", 'agent');
            setInputEnabled(true);
        }
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isComplete) return;

        addMessage(text, 'user');
        inputEl.value = '';
        setInputEnabled(false);
        showTyping(true);

        try {
            const res = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    session_id: sessionId
                })
            });

            const data = await res.json();
            sessionId = data.session_id;

            showTyping(false);
            addMessage(data.response, 'agent');

            if (data.complete && data.intake) {
                isComplete = true;
                showIntakeCard(data.intake);
                addMessage("We've saved your information. An advocate will review your case soon.", 'system');
                inputEl.placeholder = "Intake complete — thank you!";
                setInputEnabled(false);
            } else {
                setInputEnabled(true);
            }

        } catch (err) {
            showTyping(false);
            addMessage("Sorry, something went wrong. Please try again.", 'agent');
            setInputEnabled(true);
        }
    }

    // ── Event Listeners ────────────────────────────────
    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    inputEl.addEventListener('input', () => {
        sendBtn.disabled = !inputEl.value.trim() || isComplete;
    });

    // ── Start ──────────────────────────────────────────
    startChat();
</script>

</body>
</html>
