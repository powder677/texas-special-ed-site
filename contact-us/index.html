<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact Us | TexasSpecialEd.com</title>
<meta content="Contact TexasSpecialEd.com for questions, district requests, corrections, or partnership inquiries. We're here to help Texas special education families." name="description"/>
<link href="https://texasspecialed.com/contact/" rel="canonical"/>
<meta content="Contact TexasSpecialEd.com" property="og:title"/>
<meta content="Reach out for questions, district requests, corrections, or partnership inquiries. We help Texas families navigate special education." property="og:description"/>
<meta content="https://texasspecialed.com/contact/" property="og:url"/>
<meta content="website" property="og:type"/>
<link href="/styles/global.css" rel="stylesheet"/>
<script type="application/ld+json">
      {
         "@context": "https://schema.org",
         "@type": "ContactPage",
         "name": "Contact TexasSpecialEd.com",
         "description": "Contact page for TexasSpecialEd.com. Submit questions, district requests, corrections, or partnership inquiries.",
         "url": "https://texasspecialed.com/contact/",
         "mainEntity": {
            "@type": "Organization",
            "name": "Texas Special Ed",
            "url": "https://texasspecialed.com",
            "email": "hello@texasspecialed.com"
         }
      }
   </script>
<style>
      .contact-hero {
         background: linear-gradient(135deg, #002868 0%, #004080 100%);
         color: #fff;
         padding: 4rem 0;
         text-align: center;
      }

      .contact-hero h1 {
         color: #fff;
         font-size: 2.8rem;
         margin-bottom: 1rem;
      }

      .contact-hero .lead {
         color: rgba(255, 255, 255, 0.9);
         max-width: 650px;
         margin: 0 auto;
      }

      .contact-layout {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 3rem;
         padding: 4rem 0;
      }

      .contact-form-section h2 {
         margin-bottom: 0.5rem;
      }

      .contact-form-section>p {
         color: #555;
         margin-bottom: 2rem;
      }

      .contact-form {
         display: flex;
         flex-direction: column;
         gap: 1.25rem;
      }

      .form-group {
         display: flex;
         flex-direction: column;
         gap: 0.4rem;
      }

      .form-group label {
         font-weight: 600;
         font-size: 0.95rem;
         color: #333;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
         padding: 0.75rem 1rem;
         border: 1px solid #ccc;
         border-radius: 4px;
         font-size: 1rem;
         font-family: inherit;
         transition: border-color 0.2s;
         background: #fff;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
         outline: none;
         border-color: #002868;
         box-shadow: 0 0 0 2px rgba(0, 40, 104, 0.1);
      }

      .form-group textarea {
         min-height: 150px;
         resize: vertical;
      }

      .form-group .hint {
         font-size: 0.85rem;
         color: #888;
      }

      .contact-sidebar h2 {
         margin-bottom: 1.5rem;
      }

      .contact-card {
         background: #f9f9f9;
         border: 1px solid #e0e0e0;
         border-radius: 8px;
         padding: 1.5rem;
         margin-bottom: 1.5rem;
      }

      .contact-card h3 {
         font-size: 1.1rem;
         margin-bottom: 0.5rem;
         display: flex;
         align-items: center;
         gap: 0.5rem;
      }

      .contact-card p {
         color: #555;
         font-size: 0.95rem;
         line-height: 1.6;
         margin-bottom: 0;
      }

      .contact-card a {
         color: #002868;
         font-weight: 600;
      }

      .response-notice {
         background: #e8f4e8;
         border: 1px solid #b8dab8;
         border-radius: 8px;
         padding: 1.25rem;
         margin-top: 0.5rem;
      }

      .response-notice p {
         color: #2d6a2d;
         font-size: 0.95rem;
         margin: 0;
      }

      .aeo-faq-container {
         background: #f9f9f9;
         padding: 4rem 0;
      }

      .aeo-block {
         margin-bottom: 2rem;
         padding-bottom: 2rem;
         border-bottom: 1px solid #e0e0e0;
      }

      .aeo-block:last-child {
         border-bottom: none;
         margin-bottom: 0;
         padding-bottom: 0;
      }

      .aeo-block h3 {
         font-size: 1.25rem;
         margin-bottom: 0.75rem;
      }

      .aeo-block p {
         color: #444;
         line-height: 1.7;
      }

      .quick-links-section {
         padding: 3rem 0;
         text-align: center;
      }

      .quick-links-section p {
         color: #555;
         max-width: 600px;
         margin: 0 auto 1.5rem;
      }

      .quick-link-grid {
         display: grid;
         grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
         gap: 1rem;
         max-width: 700px;
         margin: 0 auto;
      }

      .quick-link-grid a {
         display: block;
         padding: 1rem;
         background: #f0f4f8;
         border-radius: 8px;
         color: #002868;
         font-weight: 600;
         text-decoration: none;
         transition: all 0.2s;
      }

      .quick-link-grid a:hover {
         background: #002868;
         color: #fff;
      }

      @media (max-width: 768px) {
         .contact-hero h1 {
            font-size: 2rem;
         }

         .contact-layout {
            grid-template-columns: 1fr;
            gap: 2rem;
         }

         .quick-link-grid {
            grid-template-columns: 1fr 1fr;
         }
      }
   </style>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>

</body></html>
